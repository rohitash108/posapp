name: Release Windows App

# Publishes installer + portable to GitHub Releases for electron-updater.
# Trigger: push a version tag that matches package.json (e.g. v1.0.1 when version is 1.0.1).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-windows:
    name: Build & Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $expected = "v" + (Get-Content package.json | ConvertFrom-Json).version
          if ($tag -ne $expected) {
            Write-Error "Tag $tag does not match package.json version ($expected). Bump version before tagging."
            exit 1
          }
          Write-Host "Tag OK: $tag"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Clean previous dist
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path electron-dist) { Remove-Item -Recurse -Force electron-dist }

      - name: Build Expo web app
        run: npx expo export -p web

      - name: Copy PWA assets
        shell: pwsh
        run: |
          $files = @('manifest.json', 'sw.js', 'icon-192.png', 'icon-512.png', 'global-tea-cafe-logo.png')
          foreach ($f in $files) {
            $src = "public\$f"
            if (Test-Path $src) { Copy-Item $src dist\; Write-Host "Copied $f" }
            else { Write-Warning "Skipping $f — not found in public\" }
          }

      - name: Build and publish to GitHub Releases
        run: npx electron-builder --win nsis portable --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        shell: pwsh
        run: Get-ChildItem electron-dist -Recurse | Where-Object { !$_.PSIsContainer } | Select-Object FullName, Length
