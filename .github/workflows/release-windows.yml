name: Release Windows App

# Publishes installer + portable to GitHub Releases for electron-updater.
# Trigger: push a version tag that matches package.json (e.g. v1.0.2 when version is 1.0.2).
# Re-run: Actions → Release Windows App → Run workflow → tag v1.0.3

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must match package.json version, e.g. v1.0.3)'
        required: true
        default: 'v1.0.3'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Electron download
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\.cache\electron
            ~\.cache\electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json', 'electron/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ inputs.tag }}'.Trim()
          } else {
            '${{ github.ref_name }}'
          }
          if ($tag -notmatch '^v') { $tag = "v$tag" }
          $expected = "v" + (Get-Content package.json | ConvertFrom-Json).version
          if ($tag -ne $expected) {
            Write-Error "Tag $tag does not match package.json version ($expected). Bump version before releasing."
            exit 1
          }
          Write-Host "Release tag: $tag"
          echo "name=$tag" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Clean previous dist
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path electron-dist) { Remove-Item -Recurse -Force electron-dist }

      - name: Write release version metadata
        run: node scripts/write-version.js

      - name: Build Expo web app
        run: npx expo export -p web

      - name: Copy PWA assets
        shell: pwsh
        run: |
          $files = @('manifest.json', 'sw.js', 'version.json', 'icon-192.png', 'icon-512.png', 'global-tea-cafe-logo.png')
          foreach ($f in $files) {
            $src = "public\$f"
            if (Test-Path $src) { Copy-Item $src dist\; Write-Host "Copied $f" }
            else { Write-Warning "Skipping $f — not found in public\" }
          }

      - name: Make Windows icon
        run: npm run make:ico

      - name: Preflight Electron download (retry on 504)
        shell: pwsh
        run: |
          $max = 5
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "Downloading Electron binary (attempt $i/$max)..."
            npx electron --version
            if ($LASTEXITCODE -eq 0) { Write-Host "Electron ready."; exit 0 }
            if ($i -lt $max) {
              $wait = 20 * $i
              Write-Host "Download failed (exit $LASTEXITCODE). Retrying in ${wait}s..."
              Start-Sleep -Seconds $wait
            }
          }
          Write-Error "Could not download Electron after $max attempts."
          exit 1

      - name: Build Windows installer + portable (publish to GitHub Release)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}\electron-builder-cache
        run: |
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            Write-Host "electron-builder attempt $i/$max..."
            npx electron-builder --win nsis portable --x64 --publish always
            if ($LASTEXITCODE -eq 0) { exit 0 }
            if ($i -lt $max) {
              $wait = 30 * $i
              Write-Host "Build failed (exit $LASTEXITCODE). Retrying in ${wait}s..."
              Start-Sleep -Seconds $wait
            }
          }
          Write-Error "electron-builder failed after $max attempts."
          exit $LASTEXITCODE

      - name: List output files
        shell: pwsh
        run: |
          Write-Host "electron-dist contents:"
          Get-ChildItem electron-dist -Recurse | Where-Object { !$_.PSIsContainer } | Select-Object FullName, Length
          $exes = Get-ChildItem electron-dist -Recurse -Include *.exe
          if ($exes.Count -eq 0) { Write-Error "No EXE files found — build failed"; exit 1 }
          $yml = Get-ChildItem electron-dist -Filter "latest*.yml" -Recurse
          if (-not $yml) { Write-Error "latest.yml missing — auto-update will not work"; exit 1 }
          Write-Host "Update metadata:"
          Get-Content $yml[0].FullName
