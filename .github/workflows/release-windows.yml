name: Release Windows App

# Publishes installer + portable to GitHub Releases for electron-updater.
# Trigger: push a version tag that matches package.json (e.g. v1.0.1 when version is 1.0.1).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (must match package.json version, e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            '${{ inputs.tag }}'.Trim()
          } else {
            '${{ github.ref_name }}'
          }
          if ($tag -notmatch '^v') { $tag = "v$tag" }
          $expected = "v" + (Get-Content package.json | ConvertFrom-Json).version
          if ($tag -ne $expected) {
            Write-Error "Tag $tag does not match package.json version ($expected). Bump version before releasing."
            exit 1
          }
          Write-Host "Release tag: $tag"
          echo "name=$tag" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Clean previous dist
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path electron-dist) { Remove-Item -Recurse -Force electron-dist }

      - name: Build Expo web app
        run: npx expo export -p web

      - name: Copy PWA assets
        shell: pwsh
        run: |
          $files = @('manifest.json', 'sw.js', 'icon-192.png', 'icon-512.png', 'global-tea-cafe-logo.png')
          foreach ($f in $files) {
            $src = "public\$f"
            if (Test-Path $src) { Copy-Item $src dist\; Write-Host "Copied $f" }
            else { Write-Warning "Skipping $f — not found in public\" }
          }

      - name: Make Windows icon
        run: npm run make:ico

      - name: Build Windows installer + portable
        run: npx electron-builder --win nsis portable --x64 --publish never

      - name: List output files
        shell: pwsh
        run: |
          Write-Host "electron-dist contents:"
          Get-ChildItem electron-dist -Recurse | Where-Object { !$_.PSIsContainer } | Select-Object FullName, Length
          $exes = Get-ChildItem electron-dist -Recurse -Include *.exe
          if ($exes.Count -eq 0) { Write-Error "No EXE files found — build failed"; exit 1 }

      - name: Upload EXE files to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: GTC POS ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            electron-dist/*Setup*.exe
            electron-dist/*Portable*.exe
            electron-dist/latest*.yml
            electron-dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
