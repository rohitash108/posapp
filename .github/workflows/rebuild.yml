name: Rebuild Windows App

# Manually triggered rebuild — useful after dependency updates, hotfixes,
# or any time you need a clean portable EXE without waiting for a push.
on:
  workflow_dispatch:
    inputs:
      version_label:
        description: 'Version label for the artifact (e.g. v1.2.3 or hotfix-login). Leave blank to use package.json version.'
        required: false
        default: ''
      clean_install:
        description: 'Delete node_modules and do a fresh install (slower but guarantees no stale deps)'
        required: false
        type: boolean
        default: false
      skip_cache:
        description: 'Bypass the npm cache (forces all packages to be re-downloaded)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rebuild-windows:
    name: Rebuild Windows Portable EXE
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node setup (with optional cache bypass) ───────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ${{ inputs.skip_cache == false && 'npm' || '' }}

      # ── 3. Clean node_modules (optional) ────────────────────────────────────
      - name: Clean node_modules
        if: ${{ inputs.clean_install == true }}
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Write-Host "Removing node_modules for a clean install..."
            Remove-Item -Recurse -Force node_modules
          }

      # ── 4. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # ── 5. Clean previous dist output ───────────────────────────────────────
      - name: Clean previous dist
        shell: pwsh
        run: |
          if (Test-Path dist) {
            Write-Host "Removing previous dist folder..."
            Remove-Item -Recurse -Force dist
          }

      # ── 6. Build Expo web app ────────────────────────────────────────────────
      - name: Build Expo web app
        run: npx expo export -p web

      # ── 7. Copy PWA / public assets into dist ───────────────────────────────
      - name: Copy PWA assets
        shell: pwsh
        run: |
          $files = @('manifest.json', 'sw.js', 'icon-192.png', 'icon-512.png', 'global-tea-cafe-logo.png')
          foreach ($f in $files) {
            $src = "public\$f"
            if (Test-Path $src) {
              Copy-Item $src dist\
              Write-Host "Copied $f"
            } else {
              Write-Warning "Skipping $f — not found in public\"
            }
          }

      # ── 8. Resolve artifact version label ────────────────────────────────────
      - name: Resolve version label
        id: version
        shell: pwsh
        run: |
          $label = "${{ inputs.version_label }}".Trim()
          if ($label -eq '') {
            $pkg = Get-Content package.json | ConvertFrom-Json
            $label = "v$($pkg.version)"
          }
          Write-Host "Artifact label: $label"
          echo "label=$label" >> $env:GITHUB_OUTPUT

      # ── 9. Build Windows portable EXE ───────────────────────────────────────
      - name: Build Windows portable EXE
        run: npx electron-builder --win portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. List built artifacts (for debugging) ─────────────────────────────
      - name: List output files
        shell: pwsh
        run: |
          Write-Host "Files in electron-dist:"
          Get-ChildItem electron-dist -Recurse | Select-Object FullName, Length

      # ── 11. Upload artifact ──────────────────────────────────────────────────
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: GTC-POS-Windows-${{ steps.version.outputs.label }}
          path: electron-dist/*.exe
          retention-days: 30
          if-no-files-found: error
