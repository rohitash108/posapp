name: Rebuild Windows App

on:
  workflow_dispatch:
    inputs:
      version_label:
        description: 'Version label (e.g. v1.2.3). Leave blank to use package.json version.'
        required: false
        default: ''
      clean_install:
        description: 'Fresh npm install (removes node_modules first)'
        required: false
        type: boolean
        default: false
      target:
        description: 'Build target'
        required: false
        type: choice
        default: 'both'
        options:
          - both
          - installer-only
          - portable-only
      publish_release:
        description: 'Publish to GitHub Releases (for auto-update). Version tag must match package.json.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rebuild-windows:
    name: Rebuild Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Clean node_modules
        if: ${{ inputs.clean_install == true }}
        shell: pwsh
        run: |
          if (Test-Path node_modules) { Remove-Item -Recurse -Force node_modules }

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Clean previous dist
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }

      - name: Write release version metadata
        run: node scripts/write-version.js

      - name: Build Expo web app
        run: npx expo export -p web

      - name: Copy PWA assets
        shell: pwsh
        run: |
          $files = @('manifest.json', 'sw.js', 'version.json', 'icon-192.png', 'icon-512.png', 'global-tea-cafe-logo.png')
          foreach ($f in $files) {
            $src = "public\$f"
            if (Test-Path $src) { Copy-Item $src dist\; Write-Host "Copied $f" }
            else { Write-Warning "Skipping $f — not found in public\" }
          }

      - name: Resolve version label
        id: version
        shell: pwsh
        run: |
          $label = "${{ inputs.version_label }}".Trim()
          if ($label -eq '') {
            $pkg = Get-Content package.json | ConvertFrom-Json
            $label = "v$($pkg.version)"
          }
          Write-Host "Label: $label"
          echo "label=$label" >> $env:GITHUB_OUTPUT

      - name: Build installer only
        if: ${{ inputs.target == 'installer-only' }}
        shell: pwsh
        run: |
          $publish = if ('${{ inputs.publish_release }}' -eq 'true') { '--publish always' } else { '' }
          npx electron-builder --win nsis --x64 @($publish.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build portable only
        if: ${{ inputs.target == 'portable-only' }}
        shell: pwsh
        run: |
          $publish = if ('${{ inputs.publish_release }}' -eq 'true') { '--publish always' } else { '' }
          npx electron-builder --win portable --x64 @($publish.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build both (installer + portable)
        if: ${{ inputs.target == 'both' || inputs.target == '' }}
        shell: pwsh
        run: |
          $publish = if ('${{ inputs.publish_release }}' -eq 'true') { '--publish always' } else { '' }
          npx electron-builder --win nsis portable --x64 @($publish.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output files
        shell: pwsh
        run: Get-ChildItem electron-dist -Recurse | Where-Object { !$_.PSIsContainer } | Select-Object FullName, Length

      - name: Upload Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: GTC-POS-Setup-${{ steps.version.outputs.label }}
          path: electron-dist/*Setup*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: GTC-POS-Portable-${{ steps.version.outputs.label }}
          path: electron-dist/*Portable*.exe
          retention-days: 30
          if-no-files-found: warn
