name: Build Windows App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows Installer + Portable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Clean previous dist
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }

      - name: Build Expo web app
        run: npx expo export -p web

      - name: Copy PWA assets
        shell: pwsh
        run: |
          $files = @('manifest.json', 'sw.js', 'icon-192.png', 'icon-512.png', 'global-tea-cafe-logo.png')
          foreach ($f in $files) {
            $src = "public\$f"
            if (Test-Path $src) { Copy-Item $src dist\; Write-Host "Copied $f" }
            else { Write-Warning "Skipping $f — not found in public\" }
          }

      - name: Build Windows installer + portable
        run: npx electron-builder --win nsis portable --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output files
        shell: pwsh
        run: Get-ChildItem electron-dist -Recurse | Where-Object { !$_.PSIsContainer } | Select-Object FullName, Length

      - name: Upload Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: GTC-POS-Setup-x64
          path: electron-dist/*Setup*.exe
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: GTC-POS-Portable
          path: electron-dist/*Portable*.exe
          retention-days: 30
          if-no-files-found: warn
